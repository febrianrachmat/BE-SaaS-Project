version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowpilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flowpilot
      POSTGRES_PASSWORD: flowpilot_dev
      POSTGRES_DB: flowpilot
    volumes:
      - flowpilot_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpilot -d flowpilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: flowpilot-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  flowpilot_pg_data:
