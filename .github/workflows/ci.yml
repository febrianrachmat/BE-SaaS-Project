name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flowpilot
          POSTGRES_PASSWORD: flowpilot_ci
          POSTGRES_DB: flowpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowpilot -d flowpilot"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://flowpilot:flowpilot_ci@localhost:5432/flowpilot?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-change-me-32chars-min
      JWT_REFRESH_SECRET: ci-refresh-secret-change-me-32chars
      FRONTEND_URL: http://localhost:3000
      STORAGE_DRIVER: local
      STORAGE_LOCAL_PATH: ./uploads
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run lint
      - run: npm test -- --passWithNoTests
      - run: npm run test:e2e
      - run: npm run build

  smoke-production:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: lint-test-build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Smoke live API
        env:
          SMOKE_API_URL: https://flowpilot.opsctrl.dev/v1
          SMOKE_WEB_URL: https://flowpilot-drab.vercel.app
        run: node ./scripts/smoke-check.mjs
